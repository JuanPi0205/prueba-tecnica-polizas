version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: polizas-postgres
    restart: always
    environment:
      POSTGRES_DB: polizas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: